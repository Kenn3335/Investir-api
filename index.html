<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VestiCore</title>
</head>

<body style="font-family: Arial; text-align:center; padding:30px;">

    <h1>💎 VestiCore</h1>

    <p>Byenvini sou platfòm VestiCore la.</p>

    <hr>

    <h2>Kreye kont</h2>

    <form action="/register" method="post">

        <input 
        type="text" 
        name="username" 
        placeholder="Non itilizatè"
        required>
        <br><br>

        <input 
        type="email" 
        name="email" 
        placeholder="Email"
        required>
        <br><br>

        <input 
        type="password" 
        name="password" 
        placeholder="Modpas"
        required>
        <br><br>

        <button type="submit">
            Kreye kont
        </button>

    </form>

    <hr>

    <h2>Konekte</h2>

    <h2>Konekte</h2>

<form action="/login" method="post">

    <input 
    type="email" 
    name="email" 
    placeholder="Email"
    required>
    <br><br>

    <input 
    type="password" 
    name="password" 
    placeholder="Modpas"
    required>
    <br><br>

    <button type="submit">
        Konekte
    </button>

</form>

    <hr>

    <h3>Sèvis VestiCore</h3>

    <button>💰 Depo</button>
    <button>💸 Retrè</button>
    <button>📊 Balans</button>
    <button>👥 Invite</button>

</body>
</html>
